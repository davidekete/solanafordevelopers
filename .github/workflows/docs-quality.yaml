name: Docs Quality Gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ──────────────────────────
  # 1. Lint, style, spelling
  # ──────────────────────────
  lint-style-spell:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Vale via the official action (no more 404s)
      - name: Set up Vale
        uses: errata-ai/vale-action@v2
        with:
          version: '3.12.0'   # pin or omit for "latest"

      # Other linters
      - name: Install markdownlint, alex, PySpelling
        run: |
          sudo npm i -g markdownlint-cli2 alex
          pip install pyspelling

      - name: Run Vale style guide
        run: vale docs/**/*.md

      - name: Run markdownlint
        run: markdownlint-cli2 "**/*.md" "#node_modules"

      - name: Run alex (inclusive language)
        run: alex docs

      - name: Run spell-check
        run: pyspelling -c .pyspelling.yml

  # ──────────────────────────
  # 2. Build & accessibility
  # ──────────────────────────
  build-and-accessibility:
    runs-on: ubuntu-latest
    needs: lint-style-spell

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build docs site
        run: npm run build

      - name: Export static site
        run: npm run export         # outputs to out/

      # Serve the exported site and scan every page with axe-core
      - name: Accessibility scan (axe-core)
        uses: cypress-io/github-action@v6
        with:
          build: npm run build       # no-op (already built)
          start: npx serve out -l 5000
          wait-on: http://localhost:5000
          command-prefix: "npx cypress run --env axe=true"
        env:
          CYPRESS_RUN_BINARY: node_modules/.bin/cypress

      # Ensure every Markdown image has non-empty alt text
      - name: Alt-text check
        run: |
          grep -R --line-number -E '!\[[^]]*\]\([^)]*\)\s*$' docs && \
          echo 'Missing alt text detected' && exit 1 || echo 'Alt text OK'

  # ──────────────────────────
  # 3. Execute code snippets
  # ──────────────────────────
  test-snippets:
    runs-on: ubuntu-latest
    needs: lint-style-spell

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - run: pip install mktestdocs
      - name: Run mktestdocs
        run: mktestdocs docs

  # ──────────────────────────
  # 4. Lighthouse performance & SEO
  # ──────────────────────────
  lighthouse:
    runs-on: ubuntu-latest
    needs: build-and-accessibility

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse CI
        run: npm i -g @lhci/cli@0.13.x

      - name: Build & export for Lighthouse
        run: |
          npm ci
          npm run build && npm run export

      - name: Run Lighthouse CI
        run: |
          lhci autorun --staticDistDir=out \
            --assert.categories.performance=0.9 \
            --assert.categories.accessibility=0.9
