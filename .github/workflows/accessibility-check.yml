# Alternative Robust Accessibility Check
# .github/workflows/accessibility-check-robust.yml
name: Accessibility Check (Robust)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  accessibility-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build site
      run: npm run build

    - name: Start server
      run: |
        npm start &
        sleep 30

    - name: Wait for server
      run: |
        timeout 60 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 1; done'

    - name: Install accessibility tools
      run: |
        npm install -g @axe-core/cli pa11y lighthouse

    - name: Run axe-core accessibility tests
      continue-on-error: true
      run: |
        echo "Running axe-core accessibility tests..."

        # Try different axe-core CLI options based on version
        if npx @axe-core/cli --help | grep -q "tags"; then
          echo "Using --tags option"
          npx @axe-core/cli http://localhost:3000 \
            --tags wcag2a,wcag2aa,wcag21aa \
            --reporter json \
            --save axe-results.json || echo "Axe with tags failed"
        else
          echo "Using basic axe-core options"
          npx @axe-core/cli http://localhost:3000 \
            --reporter json \
            --save axe-results.json || echo "Basic axe failed"
        fi

        # Also try with different output formats
        npx @axe-core/cli http://localhost:3000 \
          --reporter html \
          --save axe-results.html || echo "HTML report failed"

    - name: Run pa11y accessibility tests
      continue-on-error: true
      run: |
        echo "Running pa11y accessibility tests..."

        # Run pa11y with different configurations
        pa11y http://localhost:3000 \
          --standard WCAG2AA \
          --reporter json \
          --timeout 30000 > pa11y-results.json || echo "pa11y failed"

        pa11y http://localhost:3000 \
          --standard WCAG2AA \
          --reporter html \
          --timeout 30000 > pa11y-results.html || echo "pa11y HTML failed"

    - name: Run Lighthouse accessibility audit
      continue-on-error: true
      run: |
        echo "Running Lighthouse accessibility audit..."

        lighthouse http://localhost:3000 \
          --only-categories=accessibility \
          --output json \
          --output-path lighthouse-a11y.json \
          --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage" || echo "Lighthouse failed"

    - name: Create accessibility report
      if: always()
      run: |
        echo "# Accessibility Test Results" > accessibility-report.md
        echo "Generated on: $(date)" >> accessibility-report.md
        echo "" >> accessibility-report.md

        # Check if axe results exist
        if [ -f "axe-results.json" ]; then
          echo "## 🔍 Axe-Core Results" >> accessibility-report.md

          # Parse axe results
          violations=$(jq -r '.violations | length' axe-results.json 2>/dev/null || echo "0")
          echo "- **Violations found**: $violations" >> accessibility-report.md

          if [ "$violations" != "0" ]; then
            echo "### Violations:" >> accessibility-report.md
            jq -r '.violations[] | "- **" + .id + "**: " + .description' axe-results.json >> accessibility-report.md
          fi
          echo "" >> accessibility-report.md
        else
          echo "## 🔍 Axe-Core Results" >> accessibility-report.md
          echo "❌ Axe-core tests could not be completed" >> accessibility-report.md
          echo "" >> accessibility-report.md
        fi

        # Check if pa11y results exist
        if [ -f "pa11y-results.json" ]; then
          echo "## 🔍 Pa11y Results" >> accessibility-report.md

          # Count pa11y issues
          issues=$(jq -r 'length' pa11y-results.json 2>/dev/null || echo "0")
          echo "- **Issues found**: $issues" >> accessibility-report.md

          if [ "$issues" != "0" ]; then
            echo "### Issues:" >> accessibility-report.md
            jq -r '.[] | "- **" + .code + "**: " + .message' pa11y-results.json >> accessibility-report.md
          fi
          echo "" >> accessibility-report.md
        else
          echo "## 🔍 Pa11y Results" >> accessibility-report.md
          echo "❌ Pa11y tests could not be completed" >> accessibility-report.md
          echo "" >> accessibility-report.md
        fi

        # Check if lighthouse results exist
        if [ -f "lighthouse-a11y.json" ]; then
          echo "## 🔍 Lighthouse Accessibility Results" >> accessibility-report.md

          # Extract lighthouse accessibility score
          score=$(jq -r '.categories.accessibility.score * 100' lighthouse-a11y.json 2>/dev/null || echo "0")
          echo "- **Accessibility Score**: ${score}%" >> accessibility-report.md

          # Extract specific audits
          echo "### Key Audits:" >> accessibility-report.md
          jq -r '.audits | to_entries[] | select(.value.score != null and .value.score < 1) | "- **" + .key + "**: " + .value.title' lighthouse-a11y.json >> accessibility-report.md
          echo "" >> accessibility-report.md
        else
          echo "## 🔍 Lighthouse Accessibility Results" >> accessibility-report.md
          echo "❌ Lighthouse accessibility audit could not be completed" >> accessibility-report.md
          echo "" >> accessibility-report.md
        fi

        echo "## 📊 Summary" >> accessibility-report.md
        echo "Multiple accessibility testing tools were used to ensure comprehensive coverage:" >> accessibility-report.md
        echo "- **Axe-core**: Industry-standard accessibility testing" >> accessibility-report.md
        echo "- **Pa11y**: Command-line accessibility testing tool" >> accessibility-report.md
        echo "- **Lighthouse**: Google's accessibility audit" >> accessibility-report.md
        echo "" >> accessibility-report.md
        echo "For detailed results, check the individual JSON/HTML reports in the artifacts." >> accessibility-report.md

    - name: Upload accessibility results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: accessibility-test-results
        path: |
          axe-results.*
          pa11y-results.*
          lighthouse-a11y.json
          accessibility-report.md
        retention-days: 30

    - name: Comment on PR with accessibility results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          if (fs.existsSync('accessibility-report.md')) {
            const report = fs.readFileSync('accessibility-report.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ♿ Accessibility Test Results\n\n' + report
            });
          }

    - name: Check if accessibility tests passed
      if: always()
      run: |
        echo "Checking accessibility test results..."

        # Initialize fail flag
        ACCESSIBILITY_FAILED=false

        # Check axe results
        if [ -f "axe-results.json" ]; then
          violations=$(jq -r '.violations | length' axe-results.json 2>/dev/null || echo "0")
          if [ "$violations" != "0" ]; then
            echo "❌ Axe-core found $violations violations"
            ACCESSIBILITY_FAILED=true
          else
            echo "✅ Axe-core: No violations found"
          fi
        fi

        # Check pa11y results
        if [ -f "pa11y-results.json" ]; then
          issues=$(jq -r 'length' pa11y-results.json 2>/dev/null || echo "0")
          if [ "$issues" != "0" ]; then
            echo "❌ Pa11y found $issues issues"
            ACCESSIBILITY_FAILED=true
          else
            echo "✅ Pa11y: No issues found"
          fi
        fi

        # Check lighthouse accessibility score
        if [ -f "lighthouse-a11y.json" ]; then
          score=$(jq -r '.categories.accessibility.score * 100' lighthouse-a11y.json 2>/dev/null || echo "0")
          if [ "${score%.*}" -lt "90" ]; then
            echo "❌ Lighthouse accessibility score too low: ${score}%"
            ACCESSIBILITY_FAILED=true
          else
            echo "✅ Lighthouse accessibility score: ${score}%"
          fi
        fi

        # Fail the workflow if accessibility issues were found
        if [ "$ACCESSIBILITY_FAILED" = true ]; then
          echo "❌ Accessibility tests failed. Please review the issues above."
          exit 1
        else
          echo "✅ All accessibility tests passed!"
        fi
